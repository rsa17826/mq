<script>
  Object.assign(window, console)
  window.onPlayerLoaded = []

  // ---- Archipelago chat/log overlay -------------------------------------
  // Buffers entries until the DOM element exists, then renders live.
  // Wraps log/warn/error (which apClient.js already calls for every
  // connection, item, and chat event) so nothing in apClient.js needs to
  // change - everything it logs to the console also shows in the overlay.
  window._apChatBuffer = []
  window._apChatLogEl = null

  function _apStringify(a) {
    if (typeof a === "string") return a
    if (a instanceof Error) return a.message
    try {
      return JSON.stringify(a)
    } catch (e) {
      return String(a)
    }
  }

  function _apRenderEntry(entry) {
    var el = document.createElement("div")
    el.innerHTML =
      "<span>[" + htmlesc(entry.time) + "] </span>" + entry.msg
    el.className = "ap-chat-entry ap-chat-" + entry.type
    entry.el = el // kept so the collapsed "toast" fade loop can update it
    window._apChatLogEl.appendChild(el)
    while (window._apChatLogEl.children.length > 200) {
      window._apChatLogEl.removeChild(window._apChatLogEl.firstChild)
    }
    window._apChatLogEl.scrollTop = window._apChatLogEl.scrollHeight
  }

  function htmlesc(str) {
    return str.replaceAll("&", "&amp;").replaceAll("<", "&lt;")
  }
  function parseatts(str, type) {
    const regex = /(@\w*!)/g
    const result = str.split(regex).filter(Boolean)

    let html = "<span>"
    let inspan = false
    let inconsole = false

    // Variables for console styling
    let consoleLogStr = ""
    let consoleStyles = []
    let currentConsoleColor = "color: inherit" // Default fallback color

    for (var part of result) {
      switch (part) {
        case "@red!":
          if (inspan) html += "</span>"
          html += '<span style="color:red">'
          inspan = true

          // Track style for console
          currentConsoleColor = "color: red"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@blue!":
          if (inspan) html += "</span>"
          html += '<span style="color:skyblue">'
          inspan = true

          currentConsoleColor = "color: skyblue"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@green!":
          if (inspan) html += "</span>"
          html += '<span style="color:lightgreen">'
          inspan = true

          currentConsoleColor = "color: lightgreen"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@darkgrey!":
          if (inspan) html += "</span>"
          html += '<span style="color:darkgrey">'
          inspan = true

          currentConsoleColor = "color: darkgrey"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@grey!":
          if (inspan) html += "</span>"
          html += '<span style="color:grey">'
          inspan = true

          currentConsoleColor = "color: grey"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@darkorange!":
          if (inspan) html += "</span>"
          html += '<span style="color:darkorange">'
          inspan = true

          currentConsoleColor = "color: darkorange"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@orange!":
          if (inspan) html += "</span>"
          html += '<span style="color:orange">'
          inspan = true

          currentConsoleColor = "color: orange"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@hotpink!":
          if (inspan) html += "</span>"
          html += '<span style="color:hotpink">'
          inspan = true

          currentConsoleColor = "color: hotpink"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@cyan!":
          if (inspan) html += "</span>"
          html += '<span style="color:cyan">'
          inspan = true

          currentConsoleColor = "color: cyan"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@yellow!":
          if (inspan) html += "</span>"
          html += '<span style="color:yellow">'
          inspan = true

          currentConsoleColor = "color: yellow"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@brown!":
          if (inspan) html += "</span>"
          html += '<span style="color:brown">'
          inspan = true

          currentConsoleColor = "color: brown"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@pink!":
          if (inspan) html += "</span>"
          html += '<span style="color:pink">'
          inspan = true

          currentConsoleColor = "color: pink"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@purple!":
          if (inspan) html += "</span>"
          html += '<span style="color:purple">'
          inspan = true

          currentConsoleColor = "color: purple"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        case "@console!":
          inconsole = true
          break
        case "@!":
          if (inspan) html += "</span>"
          inspan = false
          inconsole = false

          // Reset console color back to normal
          currentConsoleColor = "color: inherit"
          consoleLogStr += "%c"
          consoleStyles.push(currentConsoleColor)
          break
        default:
          if (!inconsole) html += htmlesc(owo(part))
          consoleLogStr += owo(part)
      }
    }

    html += "</span>"

    // Use the spread operator (...) to pass the styles array as individual arguments
    console[type](consoleLogStr, ...consoleStyles)

    return html
  }

  window.apLog = function apLog(...args) {
    apChatLogRaw(
      parseatts(args.map(_apStringify).join(" "), "log"),
      "log",
    )
  }
  window.apWarn = function apWarn(...args) {
    apChatLogRaw(
      parseatts(args.map(_apStringify).join(" "), "warn"),
      "warn",
    )
  }
  window.apError = function apError(...args) {
    apChatLogRaw(
      parseatts(args.map(_apStringify).join(" "), "error"),
      "error",
    )
  }

  function apChatLogRaw(msg, type) {
    var entry = {
      msg: String(msg),
      type: type || "log",
      time: new Date().toLocaleTimeString(),
      createdAt: Date.now(), // used for the collapsed "toast" fade timing
    }
    window._apChatBuffer.push(entry)
    if (window._apChatBuffer.length > 200)
      window._apChatBuffer.shift()
    if (window._apChatLogEl) _apRenderEntry(entry)
    _apUpdateToastOpacities()
  }

  // ---- Collapsed "toast" behavior ----------------------------------------
  // While the log is collapsed, recent messages (< 5s old) still show,
  // fading out linearly over their last 1s of life, instead of the log
  // being fully hidden. The say/input row stays hidden regardless.
  var AP_TOAST_LIFETIME_MS = 5000
  var AP_TOAST_FADE_MS = 1000

  function _apUpdateToastOpacities() {
    var container = document.getElementById("apChatLogContainer")
    if (!container) return
    var now = Date.now()
    var fadeStart = AP_TOAST_LIFETIME_MS - AP_TOAST_FADE_MS
    var oneVisible = false
    window._apChatBuffer.forEach(function (entry) {
      if (!entry.el) return
      if (!container.classList.contains("collapsed")) {
        entry.el.style.display = "block"
        return
      }
      var age = now - entry.createdAt
      if (age >= AP_TOAST_LIFETIME_MS) {
        entry.el.style.display = "none"
      } else {
        entry.el.style.display = "block"
        oneVisible = true
        entry.el.style.opacity =
          age <= fadeStart ? "1" : (
            String(1 - (age - fadeStart) / AP_TOAST_FADE_MS)
          )
      }
    })
    if (oneVisible) {
      setTimeout(_apUpdateToastOpacities, 100)
    }
    document.querySelector("#apChatLog").style.display =
      oneVisible || !container.classList.contains("collapsed") ?
        "block"
      : "none"
  }

  function _apResetEntryStyles() {
    window._apChatBuffer.forEach(function (entry) {
      if (!entry.el) return
      entry.el.style.display = ""
      entry.el.style.opacity = ""
    })
    // _apUpdateToastOpacities can leave #apChatLog itself pinned to
    // display:none (when collapsed with nothing currently visible) -
    // clear that too, or expanding the log later shows nothing.
    var logEl = document.getElementById("apChatLog")
    if (logEl) logEl.style.display = ""
  }

  window._apUpdateToastOpacities = _apUpdateToastOpacities
  window._apResetEntryStyles = _apResetEntryStyles
</script>

    <script>
      window.addEventListener("touchmove", function (event) {}, false)
      if (
        typeof window.devicePixelRatio != "undefined" &&
        window.devicePixelRatio > 2
      ) {
        var meta = document.getElementById("viewport")
        meta.setAttribute(
          "content",
          "width=device-width, initial-scale=" +
            2 / window.devicePixelRatio +
            ", user-scalable=no",
        )
      }
      function toggleCollapse(on) {
        document
          .getElementById("apChatLogContainer")
          .classList.toggle("collapsed", on)
        document.getElementById("apChatLogToggle").textContent =
          (
            document
              .getElementById("apChatLogContainer")
              .classList.contains("collapsed")
          ) ?
            "▸"
          : "▾"
        localStorage.apLogVisible = !document
          .getElementById("apChatLogContainer")
          .classList.contains("collapsed")
        window._apChatLogEl.scrollTop =
          window._apChatLogEl.scrollHeight

        // Sync the toast fade state immediately so there's no one-frame
        // flash of every entry (collapsing) or of stale opacity/display
        // (expanding) before the interval next ticks.
        if (
          document
            .getElementById("apChatLogContainer")
            .classList.contains("collapsed")
        ) {
          window._apUpdateToastOpacities()
        } else {
          window._apResetEntryStyles()
        }
      }
      window.addEventListener(
        "keydown",
        function (e) {
          // Check for Tab key (9)
          if (e.keyCode === 9) {
            e.preventDefault() // Stop default browser focus switching

            var mapIframe = document.getElementById("map")
            if (mapIframe) {
              mapIframe.classList.toggle("in-front")
            }
          }

          // Existing space/arrow key protection
          if (
            [37, 38, 39, 40, 32, 8].indexOf(e.keyCode) > -1 &&
            document.activeElement.nodeName != "INPUT" &&
            document.activeElement.nodeName != "TEXTAREA"
          ) {
            e.preventDefault()
          }
          log(e.key)
          if (e.key == "`") {
            e.preventDefault()
            if (document.activeElement.id != "apChatSayInput") {
              toggleCollapse(false)
              document.querySelector("#apChatSayInput").focus()
            } else {
              toggleCollapse(true)
            }
          }
          if (e.key == "Escape") {
            e.preventDefault()
            if (document.activeElement.id == "apChatSayInput") {
              document.activeElement.blur()
            }
          }
        },
        false,
      )
    </script>

    <script>
      const canvas = document.getElementById("arrow-canvas-2d")
      const ctx = canvas.getContext("2d")
      const viewport = document.getElementById("viewport")
      const grid = document.getElementById("grid")
      const panLayer = document.getElementById("pan-layer")
      const infoPanel = document.getElementById("info-panel")

      let scale = Number(localStorage.scale ?? 0.286)
      let originX = 0
      let originY = 0
      let currentRoom = null
      let dashOffset = 0
      let isPanning = false
      let lastX = 0
      let lastY = 0
      let needsUpdate = false

      let lastLoadedResolution = null

      function resizeCanvas() {
        canvas.width = viewport.clientWidth
        canvas.height = viewport.clientHeight
        requestUpdate()
      }
      window.addEventListener("resize", resizeCanvas)

      // Smooth memory resolution toggler
      function updateTileBackgrounds() {
        // Determine target bucket path based on the current viewport layout zoom scale
        let targetResolution = "map_07"
        if (scale >= 3) {
          targetResolution = "map"
        } else if (scale >= 0.55) {
          targetResolution = "map_80"
        } else if (scale >= 0.25) {
          targetResolution = "map_30"
        } else if (scale >= 0.13) {
          targetResolution = "map_20"
        }
        targetResolution = "map_30"

        if (lastLoadedResolution === targetResolution) return
        lastLoadedResolution = targetResolution

        TILES_DATA.forEach((tile) => {
          const wrapper = document.querySelector(
            `.tile-wrapper[data-room="${tile.roomKey}"]`,
          )
          if (!wrapper) return

          const imgUrl = tile[targetResolution]

          // Preload smoothly in background cache space to prevent hard screen flashes
          const img = new Image()
          img.src = imgUrl
          img.onload = () => {
            if (lastLoadedResolution === targetResolution) {
              wrapper.style.backgroundImage = `url('${imgUrl}')`
            }
          }
        })
      }

      document.addEventListener("DOMContentLoaded", () => {
        toggleCollapse(localStorage.apLogVisible !== "true")
        resizeCanvas()
        updateTileBackgrounds()

        document.querySelectorAll(".tile-wrapper").forEach((tile) => {
          tile.addEventListener("mouseenter", function () {
            currentRoom = this.getAttribute("data-room")
            const rawInfo = this.getAttribute("data-info")
            if (infoPanel && rawInfo) {
              try {
                const infoObj = JSON.parse(rawInfo)
                let htmlContent = `<div class="info-header">Position: ${infoObj.north}, ${infoObj.east}</div>`

                if (infoObj.entries && infoObj.entries.length > 0) {
                  infoObj.entries.forEach((entry, idx) => {
                    if (idx > 0) {
                      htmlContent += `<div class="info-event-sep"></div>`
                    }
                    if (infoObj.entries.length > 1) {
                      htmlContent += `<div style="color: #aaa; margin-bottom: 4px;">--- Event #${idx + 1} ---</div>`
                    }
                    if (entry.info) {
                      htmlContent += `<div class="info-line">Info: ${entry.info}</div>`
                    }
                    if (entry.requiresHtml) {
                      htmlContent += `<div class="info-line">Requires: ${entry.requiresHtml}</div>`
                    }
                    if (entry.receiveHtml) {
                      htmlContent += `<div class="info-line">Receive: ${entry.receiveHtml}</div>`
                    }
                  })
                }
                infoPanel.innerHTML = htmlContent
              } catch (e) {
                infoPanel.innerText = rawInfo
              }
            }
            requestUpdate()
          })
          tile.addEventListener("mouseleave", function () {
            currentRoom = null
            if (infoPanel) {
              infoPanel.innerHTML =
                "Hover over a room to view details."
            }
            requestUpdate()
          })
        })
      })

      function worldToScreen(x, y) {
        return {
          x: x * scale + originX,
          y: y * scale + originY,
        }
      }

      function updateTransform() {
        if (!needsUpdate) return
        panLayer.style.transform = `translate(${originX}px, ${originY}px)`
        grid.style.transform = `scale(${scale})`
        needsUpdate = false
      }

      function drawArrow(route) {
        if (!route || !route.d) return

        const nums = route.d
        if (nums.length < 6) return

        let a, b, c
        a = worldToScreen(nums[0], nums[1])
        b = worldToScreen(nums[2], nums[3])
        c = worldToScreen(nums[4], nums[5])

        ctx.beginPath()
        ctx.moveTo(a.x, a.y)
        ctx.quadraticCurveTo(b.x, b.y, c.x, c.y)

        ctx.strokeStyle = route.color
        ctx.lineWidth = 4
        ctx.setLineDash([12, 8])
        ctx.lineCap = "round"
        ctx.stroke()

        const angle = Math.atan2(c.y - b.y, c.x - b.x)
        const arrowSize = 12

        ctx.beginPath()
        ctx.moveTo(c.x, c.y)
        ctx.lineTo(
          c.x - arrowSize * Math.cos(angle - 0.35),
          c.y - arrowSize * Math.sin(angle - 0.35),
        )
        ctx.lineTo(
          c.x - arrowSize * Math.cos(angle + 0.35),
          c.y - arrowSize * Math.sin(angle + 0.35),
        )
        ctx.closePath()

        ctx.fillStyle = route.color
        ctx.fill()
      }

      function redrawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height)
        if (!currentRoom) return

        ctx.lineDashOffset = -dashOffset
        dashOffset += 0.4

        const routes = ROUTES_DATA[currentRoom] || []
        routes.forEach(drawArrow)
      }

      function requestUpdate() {
        if (!needsUpdate) {
          needsUpdate = true
          requestAnimationFrame(() => {
            updateTransform()
            redrawCanvas()
          })
        }
      }

      // --- MOUSE PANNING ---
      viewport.addEventListener("mousedown", (e) => {
        if (e.button === 2) {
          isPanning = true
          lastX = e.clientX
          lastY = e.clientY
          viewport.style.cursor = "grabbing"
        }
      })

      window.addEventListener("mousemove", (e) => {
        if (!isPanning) return
        originX += e.clientX - lastX
        originY += e.clientY - lastY
        localStorage.originX = originX
        localStorage.originY = originY
        lastX = e.clientX
        lastY = e.clientY
        requestUpdate()
      })

      window.addEventListener("mouseup", () => {
        isPanning = false
        viewport.style.cursor = "grab"
      })

      // --- MOUSE ZOOM ---
      viewport.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault()
          const zoomIntensity = 0.0009
          const rect = viewport.getBoundingClientRect()
          const mouseX = e.clientX - rect.left
          const mouseY = e.clientY - rect.top

          const prevScale = scale
          scale += -e.deltaY * zoomIntensity
          scale = Math.min(Math.max(0.07, scale), 4)
          localStorage.scale = scale
          originX -= (mouseX - originX) * (scale / prevScale - 1)
          originY -= (mouseY - originY) * (scale / prevScale - 1)

          if (isPanning) {
            lastX = e.clientX
            lastY = e.clientY
          }
          updateTileBackgrounds()
          requestUpdate()
        },
        { passive: false },
      )

      viewport.addEventListener(
        "contextmenu",
        (e) => {
          e.preventDefault()
          e.stopPropagation()
          e.stopImmediatePropagation()
        },
        true,
      )

      function centerMap() {
        originX = Number(
          localStorage.originX ??
            (viewport.clientWidth - grid.offsetWidth * scale) / 2,
        )
        originY = Number(
          localStorage.originY ??
            (viewport.clientHeight - grid.offsetHeight * scale) / 2,
        )
        requestUpdate()
      }

      window.addEventListener("DOMContentLoaded", () => {
        centerMap()
        updateTileBackgrounds()
        viewport.addEventListener(
          "dblclick",
          (e) => {
            e.preventDefault()
            e.stopPropagation()
            e.stopImmediatePropagation()
            if (e.target.classList.contains("tile-wrapper")) {
              let [an, ae] = e.target.dataset.room.split("_")
              if (window.player) {
                window.player.realnorth = an
                window.player.realeast = ae
                test.newScreen()
              }
            }
          },
          true,
        )
      })

      setInterval(() => {
        if (currentRoom) {
          redrawCanvas()
        }
      }, 30)
    </script>

    <div id="apChatLogContainer">
      <div id="apChatLogHeader" onclick="toggleCollapse()">
        <span>Archipelago Log</span>
        <span id="apChatLogToggle">▾</span>
      </div>
      <div id="apChatLog"></div>
      <div id="apChatSayRow">
        <input
          type="text"
          id="apChatSayInput"
          placeholder="Say something..."
          maxlength="300"
        />
        <button id="apChatSaySend">Send</button>
      </div>
    </div>
    <script>
      window._apChatLogEl = document.getElementById("apChatLog")
      window._apChatBuffer.forEach(_apRenderEntry)

      function apSendSayFromInput() {
        var input = document.getElementById("apChatSayInput")
        var text = input.value.trim()
        const options = {
          help: {
            desc: "shows available commands",
            func() {
              var logtext =
                "@purple!===============@! @pink!COMMAND LIST@! @purple!===============@!\n"
              for (var [k, v] of Object.entries(options)) {
                logtext += `                  @green!${k}@!`
                for (var arg of v.args ?? []) {
                  logtext += ` @blue!<@!@green!${arg[0]}${arg[1] ? `@!@blue!=@!@green!${arg[1]}` : ""}@!@blue!>@!`
                }
                logtext += `                  \n                      ${v.desc}\n`
              }
              apLog(logtext.trimEnd())
            },
          },
          owo: {
            desc: "enables owo mode",
            func() {
              owo = _owo
              localStorage.owo = true
            },
          },
          nowo: {
            desc: "disables owo mode",
            func() {
              owo = nowo
              localStorage.owo = false
            },
          },
          connect: {
            desc: "connect to ap",
            args: [
              ["host", "127.0.0.1:38281"],
              ["name"],
              ["password"],
            ],
            func(host, name, password) {
              location.search = `?connect=${host}&name=${name}&password=${password}`
              if (window.playerLoaded && !window.ap) {
                location.reload()
              } else {
                apTryConnect()
              }
            },
          },
        }
        log(text)
        for (var [k, v] of Object.entries(options)) {
          if (text == "/" + k || owo(text) == "/" + k) {
            v.func(...text.split(" "))
            return
          }
        }
        if (!text) return
        if (!window.ap || !window.ap.isAuthenticated) {
          apWarn("Cannot send Say; not connected/authenticated yet.")
          return
        }
        window.ap.sendPackets([
          {
            cmd: "Say",
            text: text,
          },
        ])
        input.value = ""
      }

      document
        .getElementById("apChatSaySend")
        .addEventListener("click", apSendSayFromInput)

      document
        .getElementById("apChatSayInput")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault()
            apSendSayFromInput()
          }
        })
    </script>

    <script>
      const overlayCanvas = document.querySelector("#overlayCanvas")
      var overlayCtx = overlayCanvas.getContext("2d")

      function customDrawLoop() {
        try {
          // 1. Clear the frame
          overlayCtx.clearRect(
            0,
            0,
            overlayCanvas.width,
            overlayCanvas.height,
          )

          if (!window.player) {
            return
          }
          // 1. Define the size of each checkerboard tile
          var tileSize = 50 // Pixels per tile
          function mix(color1, color2) {
            if (!color1) return color2
            if (!color2) return color1

            // Helper to parse HSL, Hex, or RGB strings into an {r, g, b, a} object
            function parseToRgba(cssString) {
              cssString = cssString.trim()

              // 1. Match HSL/HSLA strings
              var hslMatches = cssString.match(
                /hsla?\(\s*([\d.]+)\s*,\s*([\d.]+)%\s*,\s*([\d.]+)%\s*(?:,\s*([\d.]+)%?\s*)?\)/i,
              )
              if (hslMatches) {
                var h = parseFloat(hslMatches[1])
                var s = parseFloat(hslMatches[2]) / 100
                var l = parseFloat(hslMatches[3]) / 100
                var a =
                  hslMatches[4] !== undefined ?
                    parseFloat(hslMatches[4])
                  : 1
                if (a > 1) a /= 100 // Normalize "60%" or "60" to 0.6

                // Convert HSL to RGB
                var c = (1 - Math.abs(2 * l - 1)) * s
                var x = c * (1 - Math.abs(((h / 60) % 2) - 1))
                var m = l - c / 2
                var r = 0,
                  g = 0,
                  b = 0

                if (0 <= h && h < 60) {
                  r = c
                  g = x
                  b = 0
                } else if (60 <= h && h < 120) {
                  r = x
                  g = c
                  b = 0
                } else if (120 <= h && h < 180) {
                  r = 0
                  g = c
                  b = x
                } else if (180 <= h && h < 240) {
                  r = 0
                  g = x
                  b = c
                } else if (240 <= h && h < 300) {
                  r = x
                  g = 0
                  b = c
                } else if (300 <= h && h < 360) {
                  r = c
                  g = 0
                  b = x
                }

                return {
                  r: Math.round((r + m) * 255),
                  g: Math.round((g + m) * 255),
                  b: Math.round((b + m) * 255),
                  a: a,
                }
              }

              // 2. Match Hex strings (e.g., #1157, #ff0000)
              if (cssString.startsWith("#")) {
                var hex = cssString.substring(1)
                var r,
                  g,
                  b,
                  a = 1

                if (hex.length === 3 || hex.length === 4) {
                  r = parseInt(hex[0] + hex[0], 16)
                  g = parseInt(hex[1] + hex[1], 16)
                  b = parseInt(hex[2] + hex[2], 16)
                  if (hex.length === 4)
                    a = parseInt(hex[3] + hex[3], 16) / 255
                } else if (hex.length === 6 || hex.length === 8) {
                  r = parseInt(hex.substring(0, 2), 16)
                  g = parseInt(hex.substring(2, 4), 16)
                  b = parseInt(hex.substring(4, 6), 16)
                  if (hex.length === 8)
                    a = parseInt(hex.substring(6, 8), 16) / 255
                }
                return { r: r, g: g, b: b, a: a }
              }

              // 3. Match raw RGB/RGBA strings (for recursive mixtures)
              var rgbaMatches = cssString.match(
                /rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*(?:,\s*([\d.]+)%?\s*)?\)/i,
              )
              if (rgbaMatches) {
                var a =
                  rgbaMatches[4] !== undefined ?
                    parseFloat(rgbaMatches[4])
                  : 1
                if (a > 1) a /= 100
                return {
                  r: parseInt(rgbaMatches[1]),
                  g: parseInt(rgbaMatches[2]),
                  b: parseInt(rgbaMatches[3]),
                  a: a,
                }
              }

              return { r: 0, g: 0, b: 0, a: 1 } // Fallback
            }

            var c1 = parseToRgba(color1) // Existing background layer
            var c2 = parseToRgba(color2) // New incoming layer drawn on top

            // Standard Source-Over Alpha Blending Formula
            var out_a = c2.a + c1.a * (1 - c2.a)
            if (out_a === 0) return "rgba(0,0,0,0)"

            var out_r = Math.round(
              (c2.r * c2.a + c1.r * c1.a * (1 - c2.a)) / out_a,
            )
            var out_g = Math.round(
              (c2.g * c2.a + c1.g * c1.a * (1 - c2.a)) / out_a,
            )
            var out_b = Math.round(
              (c2.b * c2.a + c1.b * c1.a * (1 - c2.a)) / out_a,
            )

            // Canvas context accept rgba() strings natively
            return (
              "rgba(" +
              out_r +
              ", " +
              out_g +
              ", " +
              out_b +
              ", " +
              out_a.toFixed(2) +
              ")"
            )
          }
          // Helper function to check if a specific grid cell (col, row) is an exit tile
          function getExitColor(roomExits, col, row) {
            // Convert our bottom-up canvas row (0 at bottom, 10 at top)
            // to the top-down row index (0 at top, 10 at bottom) used by the data generator
            var topDownRow = 10 - row
            var color = null
            for (var i = 0; i < roomExits.length; i++) {
              var exit = roomExits[i]

              if (exit.side === "warp") {
                if (col == exit.x && row == exit.y) {
                  color = mix(color, exit.color)
                }
              }
              if (exit.side === "west" && col === 0) {
                if (
                  topDownRow >= exit.top &&
                  topDownRow <= exit.bottom
                ) {
                  color = mix(color, exit.color)
                }
              }
              if (exit.side === "east" && col === 13) {
                // 14 columns total (0 to 13)
                if (
                  topDownRow >= exit.top &&
                  topDownRow <= exit.bottom
                ) {
                  color = mix(color, exit.color)
                }
              }
              if (exit.side === "north" && row === 10) {
                // Top row
                if (col >= exit.left && col <= exit.right) {
                  color = mix(color, exit.color)
                }
              }
              if (exit.side === "south" && row === 0) {
                // Bottom row
                if (col >= exit.left && col <= exit.right) {
                  color = mix(color, exit.color)
                }
              }
            }
            return color
          }

          function drawExits(room) {
            for (var row = 0; row < 11; row++) {
              for (var col = 0; col < 14; col++) {
                // Check if this tile is an exit
                var exitColor = getExitColor(room, col, row)

                if (exitColor) {
                  overlayCtx.fillStyle = exitColor // Render with the designated exit color
                } else {
                  // continue
                  // Alternate checkerboard background colors for standard non-exit tiles
                  if ((row + col) % 2 === 0) {
                    overlayCtx.fillStyle = "#FFFFFF10" // Light overlay instead of skipping entirely
                  } else {
                    overlayCtx.fillStyle = "#00000050" // Transparent black tile
                  }
                }

                // Calculate X coordinate (normal math going right)
                var x = col * tileSize

                // Calculate Y coordinate (reverse math starting from bottom-left)
                var y =
                  overlayCanvas.height - tileSize - row * tileSize

                // Draw the tile
                overlayCtx.fillRect(x, y, tileSize, tileSize)
              }
            }
          }
          // Sample multi-line coordinate text setup
          var coordString = ""
          with (window.player) {
            drawExits(EXITS_DATA[`${north}_${east}`] || [])

            coordString = `
            SCREEN: ${north}_${east}
            POS: ${Math.round(x)} ${Math.round(y)}
            QUEST: ${quest
              .map((e, i) => {
                return (
                  {
                    12: "access",
                    17: "aSword",
                    1: "bBomb",
                    7: "canteen",
                    9: "curse",
                    3: "dig",
                    10: "dream",
                    8: "geo",
                    0: "gTree",
                    14: "hWater",
                    16: "isles",
                    4: "mChal",
                    15: "oMan",
                    6: "pam",
                    13: "rings",
                    5: "seeds",
                    2: "warp",
                  }[i] +
                  ": " +
                  e
                )
              })
              .join("\n")}
            `
          }

          overlayCtx.font = "bold 20px sans-serif"

          // Clean the text array up
          var allText = coordString.trim().split("\n")

          // 3. Define layout parameters
          var lineHeight = 24 // Distance between your rows of text
          var baseBottomPadding = 20 // Margin from the bottom boundary line

          // 4. Draw lines calculating offsets dynamically
          for (var i = 0; i < allText.length; i++) {
            var text = allText[i].trim()

            // Measure current line width so right-alignment holds true
            var textWidth = overlayCtx.measureText(text).width
            var x = overlayCanvas.width - textWidth - 20

            var y =
              overlayCanvas.height -
              baseBottomPadding -
              (allText.length - 1 - i) * lineHeight

            overlayCtx.strokeStyle = "#000"
            overlayCtx.lineJoin = "round"
            overlayCtx.lineWidth = 3 // Controls the thickness of the outline
            overlayCtx.strokeText(text, x, y)
            overlayCtx.fillStyle = "#ddd"
            overlayCtx.fillText(text, x, y)
          }
        } catch (e) {
          error(e)
        } finally {
          requestAnimationFrame(customDrawLoop)
        }
      }
      customDrawLoop()
    </script>
