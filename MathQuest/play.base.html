<style>
  body,
  html {
    background-color: #000;
  }
</style>
<script src="/js/owo.js"></script>
<script src="/js/newelem.js"></script>
<script src="/js/q.js"></script>
<script src="/js/archipelago_manifest.js"></script>
<script>
  Object.assign(window, console)
  window.onPlayerLoaded = []
  window.apErrors = []
  window.chestedItemInfo = {}
  window.questLocations = {}
  window.settingQuestVal = 0
</script>
<html>
  <head>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/js/sw.js")
            .then((reg) =>
              console.log(
                "Service Worker registered successfully!",
                reg.scope,
              ),
            )
            .catch((err) =>
              console.log("Service Worker registration failed:", err),
            )
        })
      }
    </script>
    <link
      rel="preload"
      href="/MathQuest/fonts/BOOTERZZ.woff2"
      as="font"
      type="font/woff"
      crossorigin="anonymous"
    />
    <meta
      http-equiv="Content-Type"
      content="text/html; charset=utf-8"
    />
    <title>Math Quest | Adventure Game for Kids</title>

    <link
      href="/favicon.ico"
      rel="shortcut icon"
      type="image/x-icon"
    />

    <script type="text/javascript" src="./lib/howler.min.js"></script>
    <script type="text/javascript" src="./MathQuest.js"></script>

    <script
      type="text/javascript"
      src="/js/apClient.js"
      defer
    ></script>

    <map id="map"></map>
    <script src="/js/map.js"></script>
    <script src="/js/tracker.js"></script>
    <script src="/js/prog.js"></script>
    <script src="/js/queststate.js"></script>
    <script src="/js/roomgraph.js"></script>
    <script src="/js/logic.js"></script>
    <script src="/js/item_tracker.js"></script>
    <link rel="stylesheet" href="/css/main.css" />
  </head>

  <body>
    <div id="apChatLogContainer">
      <div id="apChatLogHeader" onclick="toggleCollapse()">
        <span>Archipelago Log</span>
        <span id="apChatLogToggle">▾</span>
      </div>
      <div id="apChatLog"></div>
      <div id="apChatSayRow">
        <input
          type="text"
          id="apChatSayInput"
          placeholder="Say something..."
          maxlength="300"
        />
        <button id="apChatSaySend">Send</button>
      </div>
    </div>
    <script src="/js/aplog.js"></script>

    <div id="gameFocus" align="center">
      <noscript
        >This webpage makes extensive use of JavaScript. Please enable
        JavaScript in your web browser to view this page.</noscript
      >

      <div id="openfl-content">
        <canvas id="overlayCanvas" width="900" height="600"></canvas>
      </div>

      <script type="text/javascript">
        lime.embed("MathQuest", "openfl-content", 900, 600, {
          parameters: {},
        })
      </script>
    </div>
    <script src="/js/overlay.js"></script>
  </body>
</html>
